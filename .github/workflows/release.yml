name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Create the GitHub Release first so the matrix uploads have a target.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 \
            || gh release create "${{ github.ref_name }}" --title "undo ${{ github.ref_name }}" --generate-notes

  # Prebuilt `undo` CLI binaries for every platform — no Rust toolchain needed
  # by users. Attached to the GitHub Release for the tag (and used by Homebrew).
  cli-binaries:
    name: CLI (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Builds `cargo build --release --bin undo` for the target (using `cross`
      # automatically where needed), archives it, and uploads it to the release.
      - name: Build & upload binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: undo
          target: ${{ matrix.target }}
          manifest-path: crates/undo-core/Cargo.toml
          archive: undo-$tag-$target
          tar: unix
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}

  # Publish the CLI crate to crates.io. Needs a CARGO_REGISTRY_TOKEN secret and a
  # verified email on the crates.io account. Skips cleanly if this exact version
  # is already published; any *other* error fails loudly (no masking).
  crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish (skip if version already on crates.io)
        run: |
          VER=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          if curl -fsS -A "agent-undo-ci" "https://crates.io/api/v1/crates/undo-core/$VER" >/dev/null 2>&1; then
            echo "undo-core $VER is already on crates.io — skipping."
          else
            cargo publish -p undo-core
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
